# Tests on every run; deploys to a single EC2 host on push to main.
# Hackathon judging does not score your pipeline — this is optional convenience.

name: Deploy to EC2

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-ec2
  cancel-in-progress: false

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Backend tests
        working-directory: backend
        run: |
          npm ci
          npm test

      - name: Frontend tests
        working-directory: frontend
        run: |
          npm ci
          npm test

  deploy:
    needs: test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER || 'ec2-user' }}
          key: ${{ secrets.EC2_SSH_PRIVATE_KEY }}
          script_stop: true
          script: |
            export APP_DIR="${{ vars.EC2_APP_DIR || '/opt/loomi' }}"
            export DEPLOY_BRANCH=main
            bash "${APP_DIR}/scripts/ec2/deploy.sh"
